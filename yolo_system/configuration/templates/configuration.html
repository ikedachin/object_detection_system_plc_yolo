<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定ページ - YOLO アノテーター</title>
    {% load static %}
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'bootstrap-icons/bootstrap-icons.css' %}">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet"> -->
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'configuration:configuration' %}">
                <strong>YOLO アノテーター - 設定</strong>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <a href="/" class="text-white text-decoration-none">
                    <i class="bi bi-arrow-left-circle me-2"></i>トップページに戻る
                </a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">設定・管理ページ</h2>
                <p class="text-muted mb-4">画像処理とアノテーションに関する設定と管理機能をご利用いただけます。</p>
            </div>
        </div>
        
        <div class="row">
            <!-- ワークフロー管理カード -->
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <i class="bi bi-diagram-3 text-primary me-3" style="font-size: 2rem;"></i>
                            <div>
                                <h5 class="card-title mb-1">ワークフロー管理</h5>
                                <p class="card-text text-muted small">タスク別フォルダ管理</p>
                            </div>
                        </div>
                        <p class="card-text">
                            切り抜きあり/なしのワークフローを選択し、データ収集からアノテーション、学習まで効率的にデータを管理できます。
                        </p>
                    </div>
                    <div class="card-footer bg-transparent">
                        <a href="{% url 'configuration:workflow_manager' %}" class="btn btn-primary">
                            <i class="bi bi-arrow-right-circle me-2"></i>ワークフロー管理を開く
                        </a>
                    </div>
                </div>
            </div>

            <!-- プロジェクト管理カード -->
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <i class="bi bi-folder-plus text-success me-3" style="font-size: 2rem;"></i>
                            <div>
                                <h5 class="card-title mb-1">プロジェクト管理</h5>
                                <p class="card-text text-muted small">プロジェクトの追加・削除</p>
                            </div>
                        </div>
                        <p class="card-text">
                            新しいプロジェクトを作成したり、既存のプロジェクトを管理できます。
                            フォルダごとデータを取り込んでdata_collection内に整理されます。
                        </p>
                    </div>
                    <div class="card-footer bg-transparent">
                        <a href="{% url 'configuration:project_manager' %}" class="btn btn-success">
                            <i class="bi bi-arrow-right-circle me-2"></i>プロジェクト管理を開く
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <!-- ここは空にしておきます（カードなし） -->
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
